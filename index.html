<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap to Open</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff4d6d;
            --secondary: #ff758f;
            --glass: rgba(255, 255, 255, 0.12);
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #24243e 0%, #0f0c29 100%);
            height: 100vh;
            height: -webkit-fill-available; /* Fix for mobile browser address bars */
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        /* Responsive Particle Canvas */
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        /* Mobile-First Glass Card */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2.5rem 1.5rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.5);
            width: 85%;
            max-width: 450px;
            margin: 20px;
            animation: slideUpFade 1.2s cubic-bezier(0.23, 1, 0.32, 1);
        }

        /* Fluid Typography */
        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.2rem, 8vw, 3.5rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff4d6d, #ffccd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .names {
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            font-weight: 600;
            letter-spacing: 3px;
            text-transform: uppercase;
            display: block;
            margin-bottom: 1rem;
            color: var(--secondary);
        }

        .divider {
            height: 3px;
            width: 60px;
            background: var(--primary);
            margin: 1.5rem auto;
            border-radius: 10px;
            box-shadow: 0 0 10px var(--primary);
        }

        p {
            font-size: clamp(0.9rem, 4vw, 1.1rem);
            line-height: 1.8;
            font-weight: 300;
            padding: 0 10px;
        }

        .heart-icon {
            color: var(--primary);
            font-size: 2.5rem;
            margin: 10px 0;
            display: inline-block;
            animation: pulse 2s ease-in-out infinite;
        }

        /* Animations */
        @keyframes slideUpFade {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 0px var(--primary)); }
            50% { transform: scale(1.15); filter: drop-shadow(0 0 15px var(--primary)); }
        }

        /* Bottom Footer Style */
        .footer {
            margin-top: 2rem;
            font-size: 0.8rem;
            letter-spacing: 2px;
            opacity: 0.7;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="glass-card">
        <div class="heart-icon">❤</div>
        <h1>Happy Anniversary</h1>
        <span class="names">Pooja & Vikash</span>
        <div class="divider"></div>
        <p>Another year of creating beautiful memories together. May your journey ahead be filled with endless love and laughter.</p>
        <div class="footer">Forever & Always</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function setCanvasSize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class HeartParticle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 20;
                this.size = Math.random() * 4 + 2;
                this.speed = Math.random() * 1.5 + 0.5;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.swing = Math.random() * 2;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 77, 109, ${this.opacity})`;
                ctx.beginPath();
                const x = this.x + Math.sin(this.y * 0.01) * this.swing;
                const y = this.y;
                const s = this.size;
                
                ctx.moveTo(x, y);
                ctx.bezierCurveTo(x, y - s, x - s, y - s, x - s, y);
                ctx.bezierCurveTo(x - s, y + s, x, y + s * 1.5, x, y + s * 2);
                ctx.bezierCurveTo(x, y + s * 1.5, x + s, y + s, x + s, y);
                ctx.bezierCurveTo(x + s, y - s, x, y - s, x, y);
                ctx.fill();
            }

            update() {
                this.y -= this.speed;
                if (this.y < -30) this.reset();
            }
        }

        function init() {
            setCanvasSize();
            particles = [];
            // Reduced count for mobile performance
            const particleCount = window.innerWidth < 768 ? 30 : 60;
            for (let i = 0; i < particleCount; i++) {
                particles.push(new HeartParticle());
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', init);
        init();
        animate();
    </script>
</body>
</html>
