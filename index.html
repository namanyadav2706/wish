<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tap to Open</title>
    <style>
        /* Import fonts inside CSS to ensure GitHub Pages pulls them correctly */
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@300;400;600&display=swap');

        :root {
            --primary: #ff4d6d;
            --secondary: #ffccd5;
            --glass: rgba(255, 255, 255, 0.08); /* Lighter glass to see hearts better */
            --text: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at center, #24243e 0%, #0f0c29 100%);
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text);
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem 1.5rem;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
            width: 85%;
            max-width: 420px;
            animation: cardEntrance 1s ease-out forwards;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: clamp(2.5rem, 9vw, 3.8rem);
            margin-bottom: 0.5rem;
            background: linear-gradient(135deg, #ff4d6d, #ffccd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* Text Animation */
            animation: titleGlow 3s ease-in-out infinite;
        }

        .names {
            font-size: clamp(1.1rem, 4.5vw, 1.5rem);
            font-weight: 600;
            letter-spacing: 4px;
            text-transform: uppercase;
            display: block;
            margin-top: 10px;
            color: var(--secondary);
            /* Slide in animation */
            opacity: 0;
            animation: slideIn 0.8s ease-out 0.5s forwards;
        }

        .divider {
            height: 3px;
            width: 50px;
            background: var(--primary);
            margin: 1.5rem auto;
            border-radius: 10px;
            box-shadow: 0 0 15px var(--primary);
        }

        p {
            font-size: clamp(0.9rem, 3.8vw, 1rem);
            line-height: 1.8;
            font-weight: 300;
            margin-bottom: 2rem;
            opacity: 0;
            animation: fadeIn 1s ease-out 1s forwards;
        }

        .heart-main {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 10px;
            display: inline-block;
            animation: beat 1.5s ease-in-out infinite;
        }

        /* KEYFRAMES */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(50px) scale(0.9); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes titleGlow {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(255,77,109,0.2)); }
            50% { filter: drop-shadow(0 0 10px rgba(255,77,109,0.8)); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-20px); }
            to { opacity: 1; transform: translateX(0); }
        }

        @keyframes fadeIn {
            to { opacity: 0.9; }
        }

        @keyframes beat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="glass-card">
        <div class="heart-main">❤</div>
        <h1>Happy Anniversary</h1>
        <span class="names">Pooja & Vikash</span>
        <div class="divider"></div>
        <p>Another year of creating beautiful memories together. May your journey ahead be filled with endless love.</p>
        <div style="font-size: 0.7rem; letter-spacing: 3px; opacity: 0.6;">FOREVER & ALWAYS</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        class Heart {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = canvas.height + 50;
                this.size = Math.random() * 5 + 3;
                this.speed = Math.random() * 2 + 1;
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.y -= this.speed;
                if (this.y < -50) this.y = canvas.height + 50;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 77, 109, ${this.opacity})`;
                ctx.beginPath();
                let x = this.x, y = this.y, s = this.size;
                ctx.moveTo(x, y);
                ctx.bezierCurveTo(x, y-s, x-s, y-s, x-s, y);
                ctx.bezierCurveTo(x-s, y+s, x, y+s*1.5, x, y+s*2);
                ctx.bezierCurveTo(x, y+s*1.5, x+s, y+s, x+s, y);
                ctx.bezierCurveTo(x+s, y-s, x, y-s, x, y);
                ctx.fill();
            }
        }

        function init() {
            resize();
            hearts = [];
            for(let i=0; i<40; i++) hearts.push(new Heart());
        }

        function loop() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        init();
        loop();
    </script>
</body>
</html>
